<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#f0b429"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#07070f"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="512" height="512" rx="110" ry="110"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g clip-path="url(#round)" opacity="0.06">
    <line x1="0" y1="128" x2="512" y2="128" stroke="#f0b429" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#f0b429" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#f0b429" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#f0b429" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#f0b429" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#f0b429" stroke-width="1"/>
  </g>

  <!-- Candlestick bars -->
  <g clip-path="url(#round)">
    <!-- Bar 1 -->
    <rect x="72" y="310" width="44" height="130" rx="6" fill="url(#gold)" opacity="0.35"/>
    <rect x="88" y="280" width="12" height="170" rx="3" fill="url(#gold)" opacity="0.2"/>
    <!-- Bar 2 -->
    <rect x="140" y="240" width="44" height="130" rx="6" fill="url(#gold)" opacity="0.5"/>
    <rect x="156" y="210" width="12" height="170" rx="3" fill="url(#gold)" opacity="0.25"/>
    <!-- Bar 3 (tallest) -->
    <rect x="208" y="170" width="44" height="130" rx="6" fill="url(#gold)" opacity="0.7"/>
    <rect x="224" y="140" width="12" height="170" rx="3" fill="url(#gold)" opacity="0.35"/>
    <!-- Bar 4 -->
    <rect x="276" y="200" width="44" height="130" rx="6" fill="url(#gold)" opacity="0.6"/>
    <rect x="292" y="170" width="12" height="170" rx="3" fill="url(#gold)" opacity="0.3"/>
    <!-- Bar 5 (highest peak) -->
    <rect x="344" y="130" width="44" height="130" rx="6" fill="url(#gold)" opacity="0.85"/>
    <rect x="360" y="100" width="12" height="170" rx="3" fill="url(#gold)" opacity="0.4"/>
    <!-- Bar 6 -->
    <rect x="412" y="160" width="44" height="130" rx="6" fill="url(#gold)" opacity="0.7"/>
    <rect x="428" y="130" width="12" height="170" rx="3" fill="url(#gold)" opacity="0.35"/>

    <!-- Trend line -->
    <polyline
      points="94,295 162,225 230,158 298,188 366,118 434,148"
      stroke="url(#gold)" stroke-width="14" fill="none"
      stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Glow dots on line -->
    <circle cx="94"  cy="295" r="10" fill="#ffd166" opacity="0.7"/>
    <circle cx="230" cy="158" r="10" fill="#ffd166" opacity="0.7"/>
    <circle cx="366" cy="118" r="14" fill="#ffd166" opacity="0.9"/>

    <!-- KS label bottom -->
    <text x="256" y="488" font-family="Arial Black, Arial, sans-serif"
      font-size="52" font-weight="900" text-anchor="middle"
      fill="url(#gold)" opacity="0.9" letter-spacing="4">KS_DATA_PRO</text>
  </g>

  <!-- Gold border glow -->
  <rect width="512" height="512" rx="110" fill="none"
    stroke="url(#gold)" stroke-width="6" opacity="0.25"/>
</svg>
