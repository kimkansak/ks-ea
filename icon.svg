<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ribbon_gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b38f00" />
      <stop offset="25%" stop-color="#f0b429" />
      <stop offset="50%" stop-color="#fff380" />
      <stop offset="75%" stop-color="#f0b429" />
      <stop offset="100%" stop-color="#b38f00" />
    </linearGradient>
    <filter id="soft_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur" />
      <feOffset in="blur" dx="0" dy="8" result="offsetBlur" />
      <feComponentTransfer in="offsetBlur" result="shadow">
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="shadow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="round_box">
      <rect width="512" height="512" rx="115" ry="115" />
    </clipPath>
  </defs>
  <rect width="512" height="512" rx="115" fill="#060812" />
  <circle cx="256" cy="150" r="300" fill="#1a1f35" opacity="0.3" />
  <g clip-path="url(#round_box)" filter="url(#soft_glow)">
    <path d="M-50 350 C 100 350, 150 150, 256 250 C 350 350, 450 50, 600 100" 
          fill="none" stroke="#f0b429" stroke-width="28" stroke-linecap="round" opacity="0.1" />
    <path d="M-50 350 C 100 350, 150 150, 256 250 C 350 350, 450 50, 600 100" 
          fill="none" stroke="url(#ribbon_gold)" stroke-width="22" stroke-linecap="round" />
  </g>
  <g filter="url(#soft_glow)">
    <circle cx="225" cy="225" r="8" fill="#fff380" />
    <circle cx="435" cy="85" r="12" fill="#fff380" />
  </g>
  <g transform="translate(256, 470)">
    <text font-family="Arial, sans-serif" font-size="42" font-weight="900" text-anchor="middle" 
          fill="url(#ribbon_gold)" letter-spacing="8" style="text-transform: uppercase;">
      KS_DATA_PRO
    </text>
    <rect x="-120" y="10" width="240" height="2" fill="url(#ribbon_gold)" opacity="0.3" />
  </g>
  <rect width="512" height="512" rx="115" fill="none" 
        stroke="url(#ribbon_gold)" stroke-width="2" opacity="0.1" />
</svg>
